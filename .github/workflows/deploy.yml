name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Deploy Registry Worker ────────────────────────────────────────────────────
  deploy-registry:
    name: Deploy Registry Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/registry

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/registry
          secrets: |
            REGISTRY_ADMIN_TOKEN
        env:
          REGISTRY_ADMIN_TOKEN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}

      - name: Run D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/registry
          command: d1 execute cerebrex-registry --file=./schema.sql --remote

  # ── Publish CLI to npm ────────────────────────────────────────────────────────
  publish-npm:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    needs: deploy-registry

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: apps/cli

      - name: Build CLI
        run: bun run build
        working-directory: apps/cli

      - name: Check if version changed
        id: version_check
        run: |
          PUBLISHED=$(npm view cerebrex version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./apps/cli/package.json').version")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" != "$LOCAL" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.changed == 'true'
        run: npm publish --access public
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version unchanged)
        if: steps.version_check.outputs.changed == 'false'
        run: echo "Version ${{ steps.version_check.outputs.local }} already published — skipping."
