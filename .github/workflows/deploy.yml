name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Deploy Registry Worker ────────────────────────────────────────────────────
  # Requires GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
  # If these are not set or the token has expired, this job is skipped gracefully.
  deploy-registry:
    name: Deploy Registry Worker
    runs-on: ubuntu-latest
    # Allow this job to fail without blocking CI (secrets may not be configured)
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/registry
        # Worker secrets (REGISTRY_ADMIN_TOKEN etc.) should be set once via:
        #   wrangler secret put REGISTRY_ADMIN_TOKEN
        # They persist on the worker and do not need to be re-set on every deploy.

      - name: Run D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/registry
          command: d1 execute cerebrex-registry --file=./schema.sql --remote
