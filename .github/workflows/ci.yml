name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages (types → core → registry-client)
        run: |
          cd packages/types && bun run build && cd ../..
          cd packages/core && bun run build && cd ../..
          cd packages/registry-client && bun run build && cd ../..

      - name: Build CLI
        run: cd apps/cli && bun run build

      - name: Typecheck CLI
        run: cd apps/cli && bun run typecheck
