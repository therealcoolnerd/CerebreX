name: Deploy MEMEX v2 Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/memex/**'
  workflow_dispatch:

concurrency:
  group: deploy-memex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy cerebrex-memex
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd workers/memex && bun install --frozen-lockfile 2>/dev/null || true

      - name: Deploy MEMEX Worker
        run: cd workers/memex && bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
